version: "3.9"

services:
  # ── Observability ──────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: trade_prometheus
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
    ports:
      - "9090:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.0.0
    container_name: trade_grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/datasource.yml:/etc/grafana/provisioning/datasources/datasource.yml:ro
      - ./infra/grafana/dashboard.json:/etc/grafana/provisioning/dashboards/dashboard.json:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    restart: unless-stopped

  # ── Alerting ───────────────────────────────────────────────
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: trade_alertmanager
    volumes:
      - ./infra/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    ports:
      - "9093:9093"
    restart: unless-stopped

volumes:
  grafana_data:
