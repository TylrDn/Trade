name: Testnet Smoke

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main]

jobs:
  smoke-dry-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install --upgrade pip && pip install -e ".[dev]"
      - run: python3 scripts/smoke_testnet.py --dry-run
      - run: pytest tests/test_smoke_testnet.py tests/test_soak_status.py tests/test_evidence_parser.py tests/test_kraken_auth.py tests/test_kraken_instruments.py tests/test_kraken_snapshot.py tests/test_venue_registry.py -v

  smoke-live:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Verify Kraken demo credentials
        run: |
          if [ -z "${{ secrets.KRAKEN_FUTURES_DEMO_API_KEY }}" ] || \
             [ -z "${{ secrets.KRAKEN_FUTURES_DEMO_API_SECRET }}" ]; then
            echo "ERROR: KRAKEN_FUTURES_DEMO_API_KEY and KRAKEN_FUTURES_DEMO_API_SECRET must be set in repo secrets for live smoke."
            exit 1
          fi
      - run: pip install --upgrade pip && pip install -e ".[dev,kraken]"
      - run: python3 scripts/smoke_testnet.py --events ./logs/events/events_test.jsonl
        env:
          TRADE_ENV: staging
          TRADE_VENUE: kraken
          KRAKEN_DEMO: "true"
          KRAKEN_FUTURES_DEMO_API_KEY: ${{ secrets.KRAKEN_FUTURES_DEMO_API_KEY }}
          KRAKEN_FUTURES_DEMO_API_SECRET: ${{ secrets.KRAKEN_FUTURES_DEMO_API_SECRET }}
